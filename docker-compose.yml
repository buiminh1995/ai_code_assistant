version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-code-assistant-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aicodeassistant

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: